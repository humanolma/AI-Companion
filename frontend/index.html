<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小梦 · AI 虚拟助手</title>
    <link rel="icon" href="avatar.jpg">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11/styles/github-dark.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --bg-start: #1a1025; --bg-mid: #2d1b3d; --bg-end: #1e1a2e;
            --card-bg: rgba(255,255,255,0.04); --card-border: rgba(255,255,255,0.08);
            --text: #e8e0f0; --text-muted: #9888a8;
            --accent: #c4a0f0; --accent-strong: #a78bfa;
            --user-bubble: linear-gradient(135deg, #7c5cbf, #a078d8);
            --chat-bg: rgba(20,10,30,0.3);
            --input-bg: rgba(255,255,255,0.06);
            --hover: rgba(255,255,255,0.06);
            --radius: 14px; --radius-sm: 10px;
            --shadow: 0 2px 16px rgba(0,0,0,0.2);
        }
        :root.light {
            --bg-start: #f5f0fa; --bg-mid: #efe4f8; --bg-end: #e8e0f5;
            --card-bg: rgba(255,255,255,0.6); --card-border: rgba(0,0,0,0.06);
            --text: #2d1b3d; --text-muted: #7a6a8a;
            --accent: #9b6dff; --accent-strong: #7c3aed;
            --user-bubble: linear-gradient(135deg, #7c3aed, #a78bfa);
            --chat-bg: rgba(240,235,250,0.4);
            --input-bg: rgba(255,255,255,0.7);
            --hover: rgba(0,0,0,0.04);
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        html, body { height:100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; color: var(--text); overflow:hidden; }
        body { background: linear-gradient(160deg, var(--bg-start), var(--bg-mid), var(--bg-end)); }

        /* 装饰光球 */
        .orb { position:fixed; border-radius:50%; filter:blur(100px); opacity:0.25; z-index:0; pointer-events:none; }
        .orb-1 { width:500px; height:500px; background:#c4a0f0; top:-200px; right:-150px; animation: orb1 25s infinite; }
        .orb-2 { width:350px; height:350px; background:#f0a0c0; bottom:-100px; left:-100px; animation: orb2 20s infinite; }
        .orb-3 { width:250px; height:250px; background:#a0c4f0; top:40%; left:50%; animation: orb3 18s infinite; }
        @keyframes orb1 { 0%,100% { transform:translate(0,0) scale(1); } 50% { transform:translate(-50px,50px) scale(1.2); } }
        @keyframes orb2 { 0%,100% { transform:translate(0,0) scale(1); } 50% { transform:translate(60px,-40px) scale(1.15); } }
        @keyframes orb3 { 0%,100% { transform:translate(0,0) scale(1); } 33% { transform:translate(30px,-20px) scale(1.1); } 66% { transform:translate(-20px,30px) scale(0.95); } }

        /* 布局 */
        #app { position:relative; z-index:1; display:flex; height:100vh; max-width:1100px; margin:0 auto; }
        .main { flex:1; display:flex; flex-direction:column; min-width:0; padding:10px 14px 10px 10px; }

        /* 顶部栏 */
        .header { display:flex; align-items:center; gap:10px; padding:10px 16px; background:var(--card-bg); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px); border:1px solid var(--card-border); border-radius:var(--radius); margin-bottom:8px; flex-shrink:0; }
        .avatar-wrap { position:relative; width:38px; height:38px; flex-shrink:0; }
        .avatar { width:38px; height:38px; border-radius:50%; object-fit:cover; border:2px solid rgba(255,255,255,0.2); }
        .status-dot { position:absolute; bottom:1px; right:1px; width:10px; height:10px; background:#4ade80; border-radius:50%; border:2px solid var(--bg-mid); }
        .header-info { flex:1; min-width:0; }
        .header-name { font-size:15px; font-weight:600; }
        .header-meta { font-size:11px; display:flex; align-items:center; gap:6px; margin-top:2px; }
        .emotion-badge { padding:1px 7px; border-radius:8px; font-size:10px; }
        .emo-happy { background:rgba(251,191,36,0.15); color:#fbbf24; }
        .emo-sad { background:rgba(96,165,250,0.15); color:#60a5fa; }
        .emo-angry { background:rgba(248,113,113,0.15); color:#f87171; }
        .emo-anxious { background:rgba(192,132,252,0.15); color:#c084fc; }
        .emo-neutral { background:rgba(74,222,128,0.15); color:#4ade80; }
        .usage-badge { font-size:10px; color:var(--text-muted); }
        .usage-badge.over-budget { color:#f87171; }
        .persona-select { background:rgba(255,255,255,0.06); border:1px solid var(--card-border); color:var(--text-muted); font-size:11px; padding:2px 6px; border-radius:7px; font-family:inherit; cursor:pointer; margin-top:2px; }

        /* 聊天区 */
        .chat-area { flex:1; overflow-y:auto; padding:6px 4px; display:flex; flex-direction:column; }
        .chat-area::-webkit-scrollbar { width:4px; }
        .chat-area::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); border-radius:10px; }
        .chat-area::-webkit-scrollbar-thumb:hover { background:rgba(255,255,255,0.18); }

        /* 欢迎语 */
        .welcome-text { text-align:center; margin:auto; padding:48px 24px; }
        .welcome-text .w-icon { font-size:48px; margin-bottom:16px; display:block; }
        .welcome-text .big { font-size:22px; font-weight:700; color:var(--accent); display:block; margin-bottom:6px; }
        .welcome-text .sub { font-size:13px; color:var(--text-muted); line-height:1.8; }

        /* 消息 */
        .msg-row { display:flex; gap:8px; max-width:78%; animation:slideIn 0.35s ease; margin-bottom:16px; }
        @keyframes slideIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        .msg-row.user { align-self:flex-end; flex-direction:row-reverse; }
        .msg-avatar { width:32px; height:32px; border-radius:50%; flex-shrink:0; overflow:hidden; }
        .msg-avatar.bot,.msg-avatar.assistant { box-shadow:0 0 0 3px rgba(196,160,240,0.2); }
        .msg-avatar.bot img, .msg-avatar.assistant img { width:32px; height:32px; display:block; border-radius:50%; object-fit:cover; }
        .msg-avatar.user { background:linear-gradient(135deg,var(--accent-strong),#d090d0); color:#fff; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; }
        .bubble { padding:8px 12px; border-radius:var(--radius-sm); font-size:13.5px; line-height:1.6; word-break:break-word; position:relative; }
        .msg-row.bot .bubble { background:var(--card-bg); border:1px solid var(--card-border); border-top-left-radius:3px; }
        .msg-row.user .bubble { background:var(--user-bubble); color:#fff; border-top-right-radius:3px; box-shadow:var(--shadow); }

        /* 打字指示器 */
        .typing-dots { display:flex; gap:4px; padding:4px 0; }
        .typing-dots span { width:6px; height:6px; border-radius:50%; background:var(--text-muted); animation:typing 1.4s infinite; }
        .typing-dots span:nth-child(2) { animation-delay:0.2s; }
        .typing-dots span:nth-child(3) { animation-delay:0.4s; }
        @keyframes typing { 0%,60%,100% { transform:translateY(0); opacity:0.3; } 30% { transform:translateY(-4px); opacity:1; } }

        /* Markdown */
        .bubble p { margin:0 0 4px; } .bubble p:last-child { margin-bottom:0; }
        .bubble ul,.bubble ol { margin:2px 0; padding-left:16px; }
        .bubble code { font-family:"JetBrains Mono","Fira Code",Consolas,monospace; font-size:12px; background:rgba(0,0,0,0.2); padding:1px 5px; border-radius:3px; }
        .bubble pre { margin:4px 0; padding:10px; border-radius:8px; background:rgba(0,0,0,0.3); overflow-x:auto; position:relative; }
        .bubble pre code { background:none; padding:0; font-size:11.5px; line-height:1.5; }
        .bubble .code-lang { position:absolute; top:4px; right:8px; font-size:8px; color:var(--text-muted); text-transform:uppercase; }
        .bubble blockquote { margin:4px 0; padding:2px 10px; border-left:3px solid var(--accent); opacity:0.8; }
        .bubble a { color:var(--accent); }
        .bubble h1,.bubble h2,.bubble h3 { margin:6px 0 2px; font-size:15px; }
        .bubble hr { margin:8px 0; border:none; border-top:1px solid var(--card-border); }
        .bubble img { max-width:100%; border-radius:8px; }

        /* 输入区 */
        .input-area { position:relative; padding:8px 12px; background:var(--input-bg); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px); border:1px solid var(--card-border); border-radius:var(--radius); display:flex; gap:6px; align-items:flex-end; flex-shrink:0; margin-top:8px; }
        .input-area textarea { flex:1; background:none; border:none; outline:none; color:var(--text); font-size:13.5px; font-family:inherit; resize:none; max-height:100px; line-height:1.5; padding:4px 2px; }
        .input-area textarea::placeholder { color:var(--text-muted); }
        .btn-icon { width:34px; height:34px; border-radius:50%; border:1px solid var(--card-border); background:var(--card-bg); cursor:pointer; font-size:14px; color:var(--text-muted); transition:all 0.15s; flex-shrink:0; }
        .btn-icon:hover { border-color:var(--accent); color:var(--accent); }
        .btn-icon.recording { background:#f87171; border-color:#f87171; color:#fff; animation:micPulse 1s infinite; }
        @keyframes micPulse { 0%,100% { box-shadow:0 0 0 0 rgba(248,113,113,0.5); } 50% { box-shadow:0 0 0 8px rgba(248,113,113,0); } }
        .btn-send { height:34px; padding:0 16px; border-radius:17px; border:none; cursor:pointer; background:linear-gradient(135deg,var(--accent-strong),#d090d0); color:#fff; font-size:12.5px; font-weight:500; font-family:inherit; transition:all 0.15s; flex-shrink:0; }
        .btn-send:hover { opacity:0.9; transform:translateY(-1px); }
        .btn-send:disabled { opacity:0.4; cursor:not-allowed; transform:none; }

        /* 斜杠菜单 */
        .slash-menu { position:absolute; bottom:calc(100% + 6px); left:0; width:220px; max-height:200px; overflow-y:auto; background:rgba(25,12,40,0.96); border:1px solid var(--card-border); border-radius:var(--radius-sm); z-index:100; backdrop-filter:blur(24px); box-shadow:var(--shadow); }
        .slash-item { padding:8px 12px; cursor:pointer; font-size:12.5px; color:var(--text-muted); display:flex; align-items:center; gap:8px; transition:background 0.1s; }
        .slash-item:hover,.slash-item.active { background:rgba(196,160,240,0.15); color:var(--text); }
        .slash-item .slash-icon { font-size:14px; width:18px; text-align:center; }
        .slash-item .slash-desc { font-size:10px; color:var(--text-muted); margin-left:auto; }

        /* 搜索 */
        .header-search { position:relative; flex-shrink:0; }
        .header-search input { width:150px; padding:5px 10px; border-radius:8px; border:1px solid var(--card-border); background:var(--card-bg); color:var(--text); font-size:12px; outline:none; font-family:inherit; transition:width 0.2s; }
        .header-search input:focus { width:180px; border-color:var(--accent); }
        .header-search input::placeholder { color:var(--text-muted); }
        .search-dropdown { position:absolute; top:36px; right:0; width:320px; max-height:320px; overflow-y:auto; background:rgba(25,12,40,0.98); border:1px solid var(--card-border); border-radius:var(--radius-sm); z-index:100; backdrop-filter:blur(24px); box-shadow:var(--shadow); }
        .search-dropdown .search-item { padding:8px 10px; cursor:pointer; font-size:12px; border-bottom:1px solid rgba(255,255,255,0.03); line-height:1.5; }
        .search-dropdown .search-item:hover { background:var(--hover); }
        .search-dropdown .search-item .role-tag { font-size:9px; padding:1px 5px; border-radius:4px; margin-right:4px; }
        .search-dropdown .role-tag.user { background:rgba(124,92,191,0.3); color:#c4a0f0; }
        .search-dropdown .role-tag.bot { background:rgba(196,160,240,0.2); color:#d0c0f0; }
        .search-dropdown .search-item mark { background:rgba(251,191,36,0.3); color:#fde68a; border-radius:2px; }
        .search-dropdown .search-empty { padding:20px; text-align:center; color:var(--text-muted); font-size:12px; }

        /* 文档标签行 */
        .doc-row { display:none; align-items:center; gap:6px; padding:3px 14px; font-size:11px; }
        .doc-label { color:var(--text-muted); }
        .doc-tag { background:rgba(196,160,240,0.12); color:var(--accent); padding:1px 7px; border-radius:5px; cursor:pointer; }
        .doc-tag:hover { background:rgba(248,113,113,0.2); color:#f87171; }

        /* 情绪面板 */
        .emotion-panel { padding:6px 14px; margin-bottom:6px; background:var(--card-bg); backdrop-filter:blur(24px); border:1px solid var(--card-border); border-radius:var(--radius-sm); font-size:12px; }
        .emotion-chart { display:flex; gap:4px; align-items:flex-end; height:48px; padding:6px 0 2px; }
        .emotion-bar-wrap { flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; }
        .emotion-bar { width:100%; max-width:24px; border-radius:3px 3px 0 0; min-height:2px; }
        .emotion-day-label { font-size:8px; color:var(--text-muted); }

        /* 操作按钮 */
        .action-bar { display:flex; gap:6px; justify-content:center; padding:6px 0; }
        .action-btn { padding:4px 12px; border-radius:12px; border:1px solid var(--card-border); background:var(--card-bg); color:var(--text-muted); font-size:11px; cursor:pointer; font-family:inherit; transition:all 0.15s; }
        .action-btn:hover { color:var(--text); border-color:var(--accent); }
        .action-btn.danger:hover { color:#f87171; border-color:#f87171; }

        @media (max-width:600px) {
            .msg-row { max-width:92%; }
            .header-search input { width:100px; }
            .header-search input:focus { width:130px; }
            .action-bar { flex-wrap:wrap; }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div>

    <div id="app">
        <div class="main">
            <!-- 顶部栏 -->
            <div class="header">
                <div class="avatar-wrap">
                    <img class="avatar" id="headerAvatar" alt="小梦">
                    <div class="status-dot"></div>
                </div>
                <div class="header-info">
                    <div class="header-name" id="headerName">小梦</div>
                    <div class="header-meta">
                        <span id="emotionBadge" class="emotion-badge emo-neutral">在线</span>
                        <select class="persona-select" id="personaSelect" onchange="switchPersona(this.value)"></select>
                        <span id="usageBadge" class="usage-badge" style="display:none"></span>
                    </div>
                </div>
                <div class="header-search">
                    <input type="text" id="searchInput" placeholder="搜索对话…" autocomplete="off">
                    <div class="search-dropdown" id="searchResults" style="display:none"></div>
                </div>
            </div>

            <!-- 情绪面板 -->
            <div class="emotion-panel" id="emotionPanel" style="display:none">
                <span style="color:var(--accent);cursor:pointer;font-size:11px;" onclick="var c=document.getElementById('emotionChart');c.style.display=c.style.display==='none'?'flex':'none'">📊 情绪趋势 ▼</span>
                <div class="emotion-chart" id="emotionChart" style="display:none"></div>
            </div>

            <!-- 文档标签 -->
            <div class="doc-row" id="docRow">
                <span class="doc-label">📎</span>
                <span id="docBadge"></span>
            </div>

            <!-- 聊天区 -->
            <div class="chat-area" id="chatArea">
                <div class="welcome-text" id="welcomeText">
                    <span class="w-icon">💫</span>
                    <span class="big">你好呀，我是小梦</span>
                    <span class="sub">你的 AI 虚拟助手<br>有什么想聊的，随时告诉我 ✨</span>
                </div>
            </div>

            <!-- 输入区 -->
            <div class="input-area">
                <div class="slash-menu" id="slashMenu" style="display:none"></div>
                <input type="file" id="fileInput" accept=".pdf,.docx,.txt,.md" style="display:none" onchange="uploadFile()">
                <button class="btn-icon" id="micBtn" title="语音输入" onclick="toggleVoice()">🎤</button>
                <button class="btn-icon" id="docBtn" onclick="document.getElementById('fileInput').click()" title="上传文档">📎</button>
                <textarea id="msgInput" placeholder="说点什么吧...（输入 / 快捷指令）" rows="1"></textarea>
                <button class="btn-send" id="sendBtn">发送</button>
            </div>

            <!-- 操作栏 -->
            <div class="action-bar">
                <button class="action-btn" onclick="resetChat()">🔄 新对话</button>
                <button class="action-btn" onclick="exportChat('markdown')">📥 导出</button>
                <button class="action-btn" id="themeBtn" onclick="applyTheme(document.documentElement.classList.contains('light')?'dark':'light');this.textContent=document.documentElement.classList.contains('light')?'🌙':'☀️'">☀️</button>
                <button class="action-btn danger" onclick="clearAll()">🗑️ 清除</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11/highlight.min.js"></script>
    <script>
        // ===== 配置：修改此地址指向后端 API =====
        const API_BASE = 'http://localhost:8080';

        // Markdown 渲染器
        marked.use({ breaks:true, gfm:true });
        const _renderer = new marked.Renderer();
        _renderer.code = function({ text, lang }) {
            const code = lang && hljs.getLanguage(lang) ? hljs.highlight(text,{language:lang}).value : hljs.highlightAuto(text).value;
            const lbl = lang ? `<span class="code-lang">${lang}</span>` : '';
            return `<pre>${lbl}<code class="hljs">${code}</code></pre>`;
        };
        marked.use({ renderer:_renderer });
        function renderMarkdown(t) { return t ? marked.parse(t) : ''; }

        // DOM refs
        const chatArea = document.getElementById('chatArea');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const emotionBadge = document.getElementById('emotionBadge');
        const welcomeText = document.getElementById('welcomeText');
        let isStreaming = false;

        // GPS
        let userLocation = null;
        function requestLocation() {
            if (!navigator.geolocation) return;
            navigator.geolocation.getCurrentPosition(
                p => { userLocation = { lat:p.coords.latitude, lng:p.coords.longitude }; },
                () => {},
                { enableHighAccuracy:false, timeout:10000, maximumAge:600000 }
            );
        }

        // 主题
        function applyTheme(mode) {
            document.documentElement.classList.toggle('light', mode==='light');
            localStorage.setItem('theme', mode);
        }
        applyTheme(localStorage.getItem('theme')||'dark');
        window.matchMedia('(prefers-color-scheme:light)').addEventListener('change', e => {
            if (!localStorage.getItem('theme')) applyTheme(e.matches?'light':'dark');
        });

        // 通知权限
        document.addEventListener('click', () => { if('Notification' in window && Notification.permission==='default') Notification.requestPermission(); }, {once:true});
        requestLocation();

        // 搜索
        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');
        let searchTimer = null;
        searchInput.addEventListener('input', () => {
            clearTimeout(searchTimer);
            const q = searchInput.value.trim();
            if (!q) { searchResults.style.display='none'; return; }
            searchTimer = setTimeout(() => doSearch(q), 250);
        });
        async function doSearch(q) {
            try {
                const r = await fetch(`${API_BASE}/api/search?q=${encodeURIComponent(q)}`); const d = await r.json();
                if (!d.results.length) { searchResults.innerHTML = '<div class="search-empty">未找到匹配</div>'; }
                else {
                    searchResults.innerHTML = d.results.map(r => {
                        const tag = r.role==='user' ? '<span class="role-tag user">我</span>' : '<span class="role-tag bot">小梦</span>';
                        const p = r.preview.replace(new RegExp(r.keyword.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'), m=>`<mark>${m}</mark>`);
                        return `<div class="search-item" onclick="jumpToMessage(${r.index})">${tag}${p}</div>`;
                    }).join('');
                }
                searchResults.style.display='block';
            } catch(_){}
        }
        function jumpToMessage(index) {
            searchResults.style.display='none'; searchInput.value='';
            const rows = chatArea.querySelectorAll('.msg-row');
            for (const row of rows) {
                if (parseInt(row.dataset.msgIndex) === index+1) {
                    row.scrollIntoView({behavior:'smooth',block:'center'});
                    row.style.boxShadow = '0 0 24px rgba(196,160,240,0.5)';
                    setTimeout(() => { row.style.boxShadow=''; }, 2000);
                    return;
                }
            }
        }
        document.addEventListener('click', e => { if (!e.target.closest('.header-search')) searchResults.style.display='none'; });

        // 情绪
        const emotionLabels = { happy:'开心 😊', sad:'低落 😢', angry:'生气 😤', anxious:'焦虑 😰', neutral:'平静 😌' };

        // 语音
        const micBtn = document.getElementById('micBtn');
        let recognition = null;
        function initRecognition() {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) { micBtn.style.display='none'; return; }
            recognition = new SR();
            recognition.lang='zh-CN'; recognition.interimResults=true; recognition.continuous=false;
            let t;
            recognition.onresult = (e) => {
                clearTimeout(t);
                let text=''; for (let i=0; i<e.results.length; i++) text += e.results[i][0].transcript;
                msgInput.value = text; msgInput.style.height='auto';
                msgInput.style.height = Math.min(msgInput.scrollHeight, 100) + 'px';
                if (e.results[0].isFinal) setTimeout(() => stopVoice(), 500);
                t = setTimeout(() => stopVoice(), 15000);
            };
            recognition.onerror = (e) => { stopVoice(); };
            recognition.onend = () => stopVoice();
        }
        function toggleVoice() {
            if (!recognition) initRecognition();
            if (!recognition) return;
            if (micBtn.classList.contains('recording')) { stopVoice(); return; }
            try { recognition.start(); micBtn.classList.add('recording'); micBtn.textContent='⏹'; } catch(_){}
        }
        function stopVoice() { micBtn.classList.remove('recording'); micBtn.textContent='🎤'; try { recognition.stop(); } catch(_){} }

        msgInput.addEventListener('input', () => { msgInput.style.height='auto'; msgInput.style.height = Math.min(msgInput.scrollHeight, 100) + 'px'; });

        // 快捷指令
        const slashMenu = document.getElementById('slashMenu');
        const SLASH = [
            { kw:'/天气', icon:'🌤️', desc:'查天气', act:()=>{ msgInput.value='今天天气怎么样？'; msgInput.style.height='auto'; sendMessage(); } },
            { kw:'/搜索', icon:'🔍', desc:'搜对话', act:()=>{ searchInput.focus(); } },
            { kw:'/导出', icon:'📥', desc:'导出MD', act:()=>exportChat('markdown') },
            { kw:'/清空', icon:'🧹', desc:'清输入', act:()=>{ msgInput.value=''; msgInput.style.height='auto'; msgInput.focus(); } },
            { kw:'/重置', icon:'🔄', desc:'新对话', act:()=>resetChat() },
        ];
        let slashOn=false, slashIdx=0;
        function showSlash(filt='') {
            const list = SLASH.filter(c => c.kw.includes(filt));
            if (!list.length) { slashMenu.style.display='none'; return; }
            slashMenu.innerHTML = list.map((c,i) => `<div class="slash-item${i===0?' active':''}" onclick="runSlash(${SLASH.indexOf(c)})"><span class="slash-icon">${c.icon}</span>${c.kw}<span class="slash-desc">${c.desc}</span></div>`).join('');
            slashMenu.style.display='block'; slashIdx=0; slashOn=true;
        }
        function runSlash(idx) { slashMenu.style.display='none'; slashOn=false; msgInput.value=''; msgInput.style.height='auto'; msgInput.focus(); SLASH[idx].act(); }

        // 键盘
        msgInput.addEventListener('keydown', (e) => {
            if (slashOn) {
                if (e.key==='ArrowDown') { e.preventDefault(); const its=slashMenu.querySelectorAll('.slash-item'); if(its.length){its[slashIdx].classList.remove('active');slashIdx=(slashIdx+1)%its.length;its[slashIdx].classList.add('active');} return; }
                if (e.key==='ArrowUp') { e.preventDefault(); const its=slashMenu.querySelectorAll('.slash-item'); if(its.length){its[slashIdx].classList.remove('active');slashIdx=(slashIdx-1+its.length)%its.length;its[slashIdx].classList.add('active');} return; }
                if (e.key==='Enter'||e.key==='Tab') { e.preventDefault(); const its=slashMenu.querySelectorAll('.slash-item'); if(its[slashIdx])its[slashIdx].click(); return; }
                if (e.key==='Escape') { e.preventDefault(); slashMenu.style.display='none'; slashOn=false; return; }
            }
            if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
            else if (e.ctrlKey && e.key==='l') { e.preventDefault(); msgInput.value=''; msgInput.style.height='auto'; msgInput.focus(); }
        });
        msgInput.addEventListener('input', () => {
            const v=msgInput.value;
            if (v==='/') showSlash();
            else if (slashOn && v.startsWith('/')) showSlash(v);
            else if (slashOn && !v.startsWith('/')) { slashMenu.style.display='none'; slashOn=false; }
        });
        document.addEventListener('click', e => { if(!e.target.closest('.input-area')){slashMenu.style.display='none';slashOn=false;} });
        sendBtn.addEventListener('click', sendMessage);

        // 发送消息
        async function sendMessage() {
            const text = msgInput.value.trim();
            if (!text || isStreaming) return;
            if (welcomeText) welcomeText.style.display='none';
            appendMessage('user', text);
            msgInput.value=''; msgInput.style.height='auto';
            const botRow = appendMessage('bot', '');
            const bubble = botRow.querySelector('.bubble');
            bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
            isStreaming=true; sendBtn.disabled=true;
            try {
                const resp = await fetch('/api/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({message:text,location:userLocation,documents:uploadedDocs.length?uploadedDocs:null}) });
                const reader = resp.body.getReader(); const decoder = new TextDecoder();
                let buffer='', fullText='', firstChunk=true;
                while (true) {
                    const { done, value } = await reader.read(); if (done) break;
                    buffer += decoder.decode(value, {stream:true});
                    const lines = buffer.split('\n\n'); buffer = lines.pop();
                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const data = JSON.parse(line.slice(6));
                        if (data.type==='emotion') { updateEmotion(data.emotion); }
                        else if (data.type==='chunk') { if(firstChunk){bubble.innerHTML='';firstChunk=false;} fullText+=data.content; bubble.textContent=fullText; scrollToBottom(); }
                        else if (data.type==='done') { bubble.innerHTML=renderMarkdown(fullText); }
                    }
                }
            } catch(_) { bubble.textContent='⚠️ 网络错误，请重试'; bubble.style.color='#f87171'; }
            isStreaming=false; sendBtn.disabled=false; msgInput.focus();
            refreshUsage(); loadEmotionChart();
        }

        function appendMessage(role, content) {
            const row = document.createElement('div'); row.className=`msg-row ${role}`;
            const avatar = document.createElement('div'); avatar.className=`msg-avatar ${role}`;
            if (role==='bot'||role==='assistant') { const img=document.createElement('img'); img.src=`${API_BASE}/static/avatar.jpg`; img.alt='小梦'; avatar.appendChild(img); }
            else { avatar.textContent='我'; }
            const bubble = document.createElement('div'); bubble.className='bubble';
            bubble.innerHTML = renderMarkdown(content);
            row.appendChild(avatar); row.appendChild(bubble);
            row.dataset.msgIndex = chatArea.children.length;
            chatArea.appendChild(row); scrollToBottom();
            return row;
        }

        function updateEmotion(e) { emotionBadge.textContent=emotionLabels[e]||'在线'; emotionBadge.className=`emotion-badge emo-${e}`; }
        function scrollToBottom() { chatArea.scrollTop = chatArea.scrollHeight; }

        // 用量
        async function refreshUsage() {
            try {
                const r=await fetch('/api/usage'); const d=await r.json();
                const b=document.getElementById('usageBadge');
                if (!d.tokens_total) { b.style.display='none'; return; }
                b.style.display=''; b.textContent=`🔥 ${(d.tokens_total/1000).toFixed(1)}K · ¥${d.cost.toFixed(3)}`;
                b.className = d.budget_remaining===0 ? 'usage-badge over-budget' : 'usage-badge';
            } catch(_){}
        }

        // 导出
        function exportChat(fmt) { const a=document.createElement('a'); a.href=`${API_BASE}/api/export?format=${fmt}`; a.download=''; document.body.appendChild(a); a.click(); document.body.removeChild(a); }

        // 操作
        async function resetChat() {
            if (!confirm('确定要开始新对话吗？')) return;
            await fetch('/api/reset',{method:'POST'}); uploadedDocs=[]; updateDocBadge();
            chatArea.innerHTML='';
            if (welcomeText) { chatArea.appendChild(welcomeText); welcomeText.style.display=''; }
            updateEmotion('neutral');
        }
        async function clearAll() {
            if (!confirm('⚠️ 确定要清除所有数据吗？\n\n这将删除：\n• 所有对话历史\n• 所有长期记忆\n\n此操作不可撤销！')) return;
            await fetch('/api/clear',{method:'POST'}); uploadedDocs=[]; updateDocBadge();
            chatArea.innerHTML='';
            if (welcomeText) { chatArea.appendChild(welcomeText); welcomeText.style.display=''; }
            updateEmotion('neutral');
        }

        // 历史
        async function loadHistory() {
            try {
                const r=await fetch('/api/history'); const d=await r.json();
                if (d.history && d.history.length>0) {
                    if (welcomeText) welcomeText.style.display='none';
                    for (const msg of d.history) appendMessage(msg.role, msg.content);
                }
                if (d.emotion && d.emotion!=='neutral') updateEmotion(d.emotion);
            } catch(_){}
        }

        // 情绪趋势
        async function loadEmotionChart() {
            try {
                const r=await fetch('/api/emotion/history?days=7'); const data=await r.json();
                if (!data.length) return;
                const panel=document.getElementById('emotionPanel'), chart=document.getElementById('emotionChart');
                panel.style.display='block';
                const maxCount=Math.max(1,...data.map(d=>Object.values(d).filter(v=>typeof v==='number').reduce((a,b)=>a+b,0)));
                const emotions=['happy','sad','angry','anxious','neutral'];
                const colors={happy:'#fbbf24',sad:'#60a5fa',angry:'#f87171',anxious:'#c084fc',neutral:'#4ade80'};
                chart.innerHTML = data.map(d=>{
                    const total=emotions.reduce((s,e)=>s+(d[e]||0),0);
                    const h=Math.max(2,(total/maxCount)*40);
                    return `<div class="emotion-bar-wrap"><div class="emotion-bar" style="height:${h}px;background:${colors[Object.entries(d).find(([k,v])=>emotions.includes(k)&&v>0)?.[0]||'neutral']};"></div><span class="emotion-day-label">${d.date.slice(5)}</span></div>`;
                }).join('');
            } catch(_){}
        }

        // 人设
        async function loadPersonas() {
            try {
                const r=await fetch('/api/personas'); const personas=await r.json();
                const sel=document.getElementById('personaSelect');
                sel.innerHTML = personas.map(p=>`<option value="${p.id}" ${p.id==='xiaomeng'?'selected':''}>${p.emoji} ${p.name}</option>`).join('');
            } catch(_){}
        }
        async function switchPersona(id) {
            try {
                const r=await fetch('/api/persona/switch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})});
                const d=await r.json();
                if (d.name) { document.getElementById('headerName').textContent=d.name; document.title=d.name+' · AI 助手'; }
            } catch(_){}
        }

        // 文件上传
        let uploadedDocs=[];
        function updateDocBadge() {
            const row=document.getElementById('docRow'), badge=document.getElementById('docBadge');
            if (!uploadedDocs.length) { row.style.display='none'; badge.innerHTML=''; msgInput.placeholder='说点什么吧...（输入 / 快捷指令）'; }
            else { row.style.display='flex'; badge.innerHTML=uploadedDocs.map((d,i)=>`<span class="doc-tag" onclick="removeDoc(${i})">📄 ${d.filename} ✕</span>`).join(''); msgInput.placeholder=`已加载 ${uploadedDocs.length} 个文档，直接提问吧...`; }
        }
        function removeDoc(i) { uploadedDocs.splice(i,1); updateDocBadge(); }
        async function uploadFile() {
            const input=document.getElementById('fileInput'), file=input.files[0];
            if (!file) return;
            if (file.size>10*1024*1024) { alert('文件太大，限制10MB'); input.value=''; return; }
            const form=new FormData(); form.append('file',file);
            document.getElementById('docBtn').textContent='⏳';
            try {
                const r=await fetch('/api/upload',{method:'POST',body:form}); const d=await r.json();
                if (d.error) { alert(d.error); return; }
                const idx=uploadedDocs.findIndex(x=>x.filename===d.filename);
                if (idx>=0) uploadedDocs[idx]={filename:d.filename,text:d.text};
                else uploadedDocs.push({filename:d.filename,text:d.text});
                updateDocBadge(); msgInput.focus();
            } catch(e) { alert('上传失败: '+e.message); }
            input.value=''; document.getElementById('docBtn').textContent='📎';
        }

        document.getElementById('headerAvatar').src = `${API_BASE}/static/avatar.jpg`;
        loadHistory(); loadEmotionChart(); loadPersonas(); msgInput.focus();
    </script>
</body>
</html>
