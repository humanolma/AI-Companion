<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小梦 · AI 虚拟助手</title>
    <link rel="icon" href="/static/avatar.jpg">
    <!-- Markdown 渲染: marked + highlight.js -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11/styles/github-dark.min.css">
    <style>
        /* ========== 全局重置 ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-1: #0f0c29; --bg-2: #302b63; --bg-3: #24243e;
            --glass: rgba(255,255,255,0.08); --glass-border: rgba(255,255,255,0.15);
            --text: #f0f0f5; --text-dim: #a0a0b8;
            --accent: #a78bfa; --accent-glow: rgba(167,139,250,0.4);
            --user-bubble: linear-gradient(135deg,#667eea,#764ba2);
            --bot-bubble: rgba(255,255,255,0.1);
            --emotion-happy: #fbbf24; --emotion-sad: #60a5fa;
            --emotion-angry: #f87171; --emotion-anxious: #c084fc; --emotion-neutral: #94a3b8;
        }
        /* 亮色主题 */
        :root.light {
            --bg-1: #f5f3ff; --bg-2: #ede9fe; --bg-3: #e0e7ff;
            --glass: rgba(255,255,255,0.7); --glass-border: rgba(0,0,0,0.1);
            --text: #1e1b4b; --text-dim: #6b7280;
            --accent: #7c3aed; --accent-glow: rgba(124,58,237,0.25);
            --user-bubble: linear-gradient(135deg,#7c3aed,#a855f7);
            --bot-bubble: rgba(0,0,0,0.04);
        }
        /* 亮色背景覆盖 */
        :root.light body {
            background: linear-gradient(-45deg, #f5f3ff, #ede9fe, #e0e7ff, #f0fdf4);
        }
        :root.light .orb { opacity: 0.15; }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
            color: var(--text);
            overflow: hidden;
        }

        /* ========== 动态背景 ========== */
        body {
            background: linear-gradient(-45deg, var(--bg-1), var(--bg-2), var(--bg-3), #1a1a2e);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            position: relative;
        }

        @keyframes gradientShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 浮动光球 */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            z-index: 0;
            animation: float 20s ease-in-out infinite;
        }
        .orb-1 { width: 400px; height: 400px; background: #a78bfa; top: -100px; left: -100px; }
        .orb-2 { width: 350px; height: 350px; background: #ec4899; bottom: -80px; right: -80px; animation-delay: -5s; }
        .orb-3 { width: 300px; height: 300px; background: #3b82f6; top: 50%; left: 50%; animation-delay: -10s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33%      { transform: translate(30px, -50px) scale(1.1); }
            66%      { transform: translate(-20px, 30px) scale(0.95); }
        }

        /* ========== 主容器 ========== */
        #app {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            max-width: 860px;
            margin: 0 auto;
            padding: 16px;
        }

        /* ========== 顶部栏 ========== */
        .header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 24px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            margin-bottom: 12px;
            position: relative;
            z-index: 10;
        }

        .avatar-wrap {
            position: relative;
            width: 52px;
            height: 52px;
            flex-shrink: 0;
        }

        .avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.3);
            box-shadow: 0 0 20px var(--accent-glow);
            animation: avatarPulse 3s ease-in-out infinite;
            display: block;
        }

        @keyframes avatarPulse {
            0%, 100% { box-shadow: 0 0 20px var(--accent-glow); }
            50%      { box-shadow: 0 0 35px var(--accent-glow), 0 0 60px rgba(236, 72, 153, 0.2); }
        }

        /* 在线指示器 */
        .status-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 14px;
            height: 14px;
            background: #4ade80;
            border-radius: 50%;
            border: 2.5px solid var(--bg-2);
        }

        .header-info { flex: 1; }
        .persona-select {
            background: rgba(255,255,255,0.08); border: 1px solid var(--glass-border);
            color: var(--text-dim); font-size: 11px; padding: 2px 6px; border-radius: 8px;
            font-family: inherit; cursor: pointer; margin-top: 2px;
        }
        .header-name {
            font-size: 18px;
            font-weight: 600;
            line-height: 1.3;
        }
        .header-status {
            font-size: 12px;
            color: #4ade80;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* 情绪标签 */
        .emotion-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
            transition: all 0.3s;
        }
        .emotion-badge::before {
            content: "";
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }
        .emo-happy    { background: rgba(251,191,36,0.15); color: var(--emotion-happy); }
        .emo-happy::before    { background: var(--emotion-happy); box-shadow: 0 0 6px var(--emotion-happy); }
        .emo-sad      { background: rgba(96,165,250,0.15); color: var(--emotion-sad); }
        .emo-sad::before      { background: var(--emotion-sad); box-shadow: 0 0 6px var(--emotion-sad); }
        .emo-angry    { background: rgba(248,113,113,0.15); color: var(--emotion-angry); }
        .emo-angry::before    { background: var(--emotion-angry); box-shadow: 0 0 6px var(--emotion-angry); }
        .emo-anxious  { background: rgba(192,132,252,0.15); color: var(--emotion-anxious); }
        .emo-anxious::before  { background: var(--emotion-anxious); box-shadow: 0 0 6px var(--emotion-anxious); }
        .emo-neutral  { background: rgba(74, 222, 128, 0.15); color: #4ade80; }
        .emo-neutral::before  { background: #4ade80; box-shadow: 0 0 6px #4ade80; }

        /* 用量指示器 */
        .usage-badge {
            font-size: 11px;
            color: var(--text-dim);
            margin-left: 8px;
        }
        .usage-badge.over-budget {
            color: #f87171;
        }

        /* 搜索框 */
        .header-search {
            position: relative;
            flex-shrink: 0;
        }
        .header-search input {
            width: 160px;
            padding: 6px 12px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.06);
            color: var(--text);
            font-size: 12px;
            outline: none;
            transition: all 0.2s;
            font-family: inherit;
        }
        .header-search input:focus {
            width: 200px;
            border-color: var(--accent);
        }
        .header-search input::placeholder { color: var(--text-dim); }

        .search-dropdown {
            position: absolute;
            top: 38px;
            right: 0;
            width: 360px;
            max-height: 420px;
            overflow-y: auto;
            background: rgba(20, 18, 50, 0.98);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            z-index: 100;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .search-dropdown .search-item {
            padding: 10px 14px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 13px;
            line-height: 1.5;
            transition: background 0.15s;
        }
        .search-dropdown .search-item:hover {
            background: rgba(167,139,250,0.1);
        }
        .search-dropdown .search-item .role-tag {
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 6px;
            margin-right: 6px;
            font-weight: 500;
        }
        .search-dropdown .search-item .role-tag.user {
            background: rgba(102,126,234,0.3);
            color: #a5b4fc;
        }
        .search-dropdown .search-item .role-tag.bot {
            background: rgba(167,139,250,0.25);
            color: #c4b5fd;
        }
        .search-dropdown .search-item mark {
            background: rgba(251,191,36,0.35);
            color: #fde68a;
            border-radius: 2px;
            padding: 0 1px;
        }
        .search-dropdown .search-empty {
            padding: 24px;
            text-align: center;
            color: var(--text-dim);
            font-size: 13px;
        }

        /* 快捷指令菜单 */
        .slash-menu {
            position: absolute;
            bottom: calc(100% + 8px);
            left: 0;
            width: 240px;
            max-height: 240px;
            overflow-y: auto;
            background: rgba(20, 18, 50, 0.98);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            z-index: 100;
            backdrop-filter: blur(20px);
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
        }
        .slash-item {
            padding: 10px 14px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.1s;
        }
        .slash-item:first-child { border-radius: 12px 12px 0 0; }
        .slash-item:last-child { border-radius: 0 0 12px 12px; }
        .slash-item:hover, .slash-item.active {
            background: rgba(167,139,250,0.15);
            color: var(--text);
        }
        .slash-item .slash-icon { font-size: 15px; width: 22px; text-align: center; }
        .slash-item .slash-keyword { color: var(--accent); font-weight: 500; }
        .slash-item .slash-desc { font-size: 11px; color: var(--text-dim); margin-left: auto; }

        /* ========== 聊天区域 ========== */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scroll-behavior: smooth;
        }

        .chat-area::-webkit-scrollbar { width: 5px; }
        .chat-area::-webkit-scrollbar-track { background: transparent; }
        .chat-area::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.15);
            border-radius: 10px;
        }

        /* 消息行 */
        .msg-row {
            display: flex;
            gap: 10px;
            max-width: 80%;
            animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .msg-row.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        /* 消息头像 */
        .msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        .msg-avatar.bot,
        .msg-avatar.assistant {
            background: linear-gradient(135deg, #a78bfa, #ec4899);
            box-shadow: 0 2px 12px rgba(167, 139, 250, 0.3);
            overflow: hidden;
        }
        .msg-avatar.bot img,
        .msg-avatar.assistant img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .msg-avatar.user {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid var(--glass-border);
        }

        /* 消息气泡 */
        .bubble {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14.5px;
            line-height: 1.6;
            word-break: break-word;
            position: relative;
        }

        .msg-row.bot .bubble {
            background: var(--bot-bubble);
            border: 1px solid var(--glass-border);
            border-top-left-radius: 6px;
            backdrop-filter: blur(10px);
        }

        .msg-row.user .bubble {
            background: var(--user-bubble);
            color: #fff;
            border-top-right-radius: 6px;
            box-shadow: 0 2px 16px rgba(102, 126, 234, 0.3);
        }

        /* 打字指示器 */
        .typing-dots {
            display: flex;
            gap: 5px;
            padding: 4px 0;
        }
        .typing-dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-dim);
            animation: typingBounce 1.4s ease-in-out infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30%           { transform: translateY(-6px); opacity: 1; }
        }

        /* ========== Markdown 渲染样式 ========== */
        .bubble p { margin: 0 0 8px; }
        .bubble p:last-child { margin-bottom: 0; }

        .bubble ul, .bubble ol {
            margin: 6px 0;
            padding-left: 20px;
        }
        .bubble li { margin: 2px 0; }
        .bubble ul { list-style-type: disc; }
        .bubble ul ul { list-style-type: circle; }
        .bubble ol { list-style-type: decimal; }

        .bubble code {
            font-family: "Cascadia Code", "Fira Code", "JetBrains Mono", Consolas, monospace;
            font-size: 13px;
            background: rgba(255,255,255,0.08);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .bubble pre {
            margin: 8px 0;
            padding: 14px;
            border-radius: 10px;
            background: #1a1a2e;
            overflow-x: auto;
            border: 1px solid var(--glass-border);
            position: relative;
        }
        .bubble .code-lang {
            position: absolute;
            top: 6px;
            right: 10px;
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: inherit;
        }
        .bubble pre code {
            background: transparent;
            padding: 0;
            border-radius: 0;
            font-size: 12.5px;
            line-height: 1.55;
        }
        /* 代码块语法高亮覆盖：hljs 背景与 pre 统一 */
        .bubble pre code.hljs {
            background: transparent;
            padding: 0;
        }

        .bubble blockquote {
            margin: 8px 0;
            padding: 6px 14px;
            border-left: 3px solid var(--accent);
            background: rgba(167,139,250,0.06);
            border-radius: 0 8px 8px 0;
            color: var(--text-dim);
        }
        .bubble blockquote p:last-child { margin-bottom: 0; }

        .bubble a {
            color: var(--accent);
            text-decoration: underline;
            text-underline-offset: 2px;
            transition: color 0.2s;
        }
        .bubble a:hover { color: #c4b5fd; }

        .bubble table {
            margin: 8px 0;
            border-collapse: collapse;
            width: 100%;
            font-size: 13px;
        }
        .bubble th, .bubble td {
            padding: 6px 12px;
            border: 1px solid var(--glass-border);
            text-align: left;
        }
        .bubble th {
            background: rgba(255,255,255,0.06);
            font-weight: 600;
        }

        .bubble h1, .bubble h2, .bubble h3,
        .bubble h4, .bubble h5, .bubble h6 {
            margin: 10px 0 6px;
            font-weight: 600;
            line-height: 1.3;
        }
        .bubble h1 { font-size: 20px; }
        .bubble h2 { font-size: 18px; }
        .bubble h3 { font-size: 16px; }
        .bubble h4, .bubble h5, .bubble h6 { font-size: 15px; }

        .bubble strong { font-weight: 600; }
        .bubble em { font-style: italic; }

        .bubble hr {
            margin: 12px 0;
            border: none;
            border-top: 1px solid var(--glass-border);
        }

        .bubble img {
            max-width: 100%;
            border-radius: 10px;
            margin: 6px 0;
        }

        /* ========== 欢迎语 ========== */
        .welcome-text {
            text-align: center;
            color: var(--text-dim);
            font-size: 13px;
            margin: auto;
            padding: 40px;
            line-height: 2;
        }
        .welcome-text .big {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #ec4899, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: block;
            margin-bottom: 8px;
        }

        /* 文档标签行 */
        .doc-row {
            display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
            padding: 4px 16px; font-size: 11px;
        }
        .doc-label { color: var(--text-dim); white-space: nowrap; }
        .doc-tag {
            background: rgba(167,139,250,0.15); color: var(--accent);
            padding: 2px 8px; border-radius: 6px; cursor: pointer; white-space: nowrap;
        }
        .doc-tag:hover { background: rgba(248,113,113,0.2); color: #f87171; }

        /* ========== 输入区域 ========== */
        .input-area {
            padding: 12px 16px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            margin-top: 12px;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-area textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-size: 14.5px;
            font-family: inherit;
            resize: none;
            max-height: 120px;
            line-height: 1.5;
            padding: 8px 4px;
        }
        .input-area textarea::placeholder { color: var(--text-dim); }

        .mic-btn {
            width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--glass-border);
            background: var(--glass); cursor: pointer; font-size: 16px;
            transition: all 0.2s; flex-shrink: 0; color: var(--text-dim);
        }
        .mic-btn:hover { border-color: var(--accent); color: var(--text); }
        .mic-btn.recording {
            background: #f87171; border-color: #f87171; color: #fff;
            animation: micPulse 1s ease-in-out infinite;
        }
        @keyframes micPulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(248,113,113,0.5); }
            50% { box-shadow: 0 0 0 10px rgba(248,113,113,0); }
        }
        .send-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            background: linear-gradient(135deg, #a78bfa, #ec4899);
            color: #fff;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 2px 16px var(--accent-glow);
            flex-shrink: 0;
        }
        .send-btn:hover { transform: scale(1.08); box-shadow: 0 4px 24px var(--accent-glow); }
        .send-btn:active { transform: scale(0.95); }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        /* 情绪面板 */
        .emotion-panel {
            padding: 6px 14px; margin-bottom: 8px;
            background: var(--glass); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 12px;
            font-size: 12px;
        }
        .emotion-chart {
            display: flex; gap: 6px; align-items: flex-end; padding: 8px 0 4px;
            height: 64px;
        }
        .emotion-bar-wrap {
            flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
        }
        .emotion-bar {
            width: 100%; max-width: 32px; border-radius: 4px 4px 0 0; min-height: 2px;
            transition: height 0.5s ease;
        }
        .emotion-bar.happy { background: #fbbf24; }
        .emotion-bar.sad { background: #60a5fa; }
        .emotion-bar.angry { background: #f87171; }
        .emotion-bar.anxious { background: #c084fc; }
        .emotion-bar.neutral { background: #4ade80; }
        .emotion-day-label { font-size: 9px; color: var(--text-dim); }

        /* 操作按钮 */
        .action-bar {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            justify-content: center;
        }
        .action-btn {
            padding: 6px 16px;
            border-radius: 14px;
            border: 1px solid var(--glass-border);
            background: var(--glass);
            color: var(--text-dim);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
            font-family: inherit;
        }
        .action-btn:hover {
            color: var(--text);
            border-color: var(--accent);
            background: rgba(167, 139, 250, 0.1);
        }
        .action-btn.danger:hover {
            color: #f87171;
            border-color: #f87171;
            background: rgba(248, 113, 113, 0.1);
        }

        /* ========== 响应式 ========== */
        @media (max-width: 600px) {
            #app { padding: 8px; }
            .header { padding: 12px 16px; border-radius: 16px; }
            .msg-row { max-width: 90%; }
            .bubble { font-size: 14px; }
        }
    </style>
</head>
<body>
    <!-- 背景光球 -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div id="app">
        <!-- 顶部栏 -->
        <div class="header">
                <div class="avatar-wrap">
                    <img class="avatar" src="/static/avatar.jpg" alt="小梦">
                    <div class="status-dot"></div>
                </div>
            <div class="header-info">
                <div class="header-name" id="headerName">小梦</div>
                <select class="persona-select" id="personaSelect" onchange="switchPersona(this.value)" title="切换人设"></select>
                <div class="header-status">
                    <span id="emotionBadge" class="emotion-badge emo-neutral">在线</span>
                    <span id="usageBadge" class="usage-badge" style="display:none"></span>
                </div>
            </div>
            <div class="header-search">
                <input type="text" id="searchInput" placeholder="🔍 搜索对话…" autocomplete="off">
                <div id="searchResults" class="search-dropdown" style="display:none"></div>
            </div>
        </div>

        <!-- 情绪趋势（折叠） -->
        <div class="emotion-panel" id="emotionPanel" style="display:none">
            <span class="cal-label" onclick="document.getElementById('emotionChart').style.display = document.getElementById('emotionChart').style.display === 'none' ? 'flex' : 'none'" style="cursor:pointer">📊 情绪趋势 ▼</span>
            <div class="emotion-chart" id="emotionChart" style="display:none"></div>
        </div>

        <!-- 聊天区域 -->
        <div class="chat-area" id="chatArea">
            <div class="welcome-text" id="welcomeText">
                <span class="big">你好呀 ~</span>
                我是<span style="color:var(--accent)">小梦</span>，你的 AI 虚拟助手<br>
                有什么想聊的，随时告诉我 ✨
            </div>
        </div>

        <!-- 文档标签行 -->
        <div class="doc-row" id="docRow" style="display:none">
            <span class="doc-label">📎 已加载：</span>
            <span id="docBadge"></span>
        </div>

        <!-- 输入区域 -->
        <div class="input-area" style="position:relative">
            <div class="slash-menu" id="slashMenu" style="display:none"></div>
            <input type="file" id="fileInput" accept=".pdf,.docx,.txt,.md" style="display:none" onchange="uploadFile()">
            <button class="mic-btn" id="micBtn" title="语音输入" onclick="toggleVoice()">🎤</button>
            <button class="mic-btn" id="docBtn" onclick="document.getElementById('fileInput').click()" title="上传文档">📎</button>
            <textarea id="msgInput" placeholder="说点什么吧...（输入 / 查看快捷指令）" rows="1"></textarea>
            <button class="send-btn" id="sendBtn">➤</button>
        </div>

        <!-- 操作按钮 -->
        <div class="action-bar">
            <button class="action-btn" onclick="resetChat()">🔄 重置对话</button>
            <button class="action-btn" onclick="exportChat('markdown')">📥 导出 Markdown</button>
            <button class="action-btn" onclick="exportChat('json')">📄 导出 JSON</button>
            <button class="action-btn" id="themeBtn" onclick="applyTheme(document.documentElement.classList.contains('light')?'dark':'light'); document.getElementById('themeBtn').textContent=document.documentElement.classList.contains('light')?'🌙':'☀️'">☀️</button>
            <button class="action-btn danger" onclick="clearAll()">🗑️ 清除所有数据</button>
        </div>
    </div>

    <!-- Markdown 渲染库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11/highlight.min.js"></script>
    <script>
        // ========== Markdown 渲染器配置 ==========
        marked.use({
            breaks: true,
            gfm: true,
        });

        // 配置 marked 使用 highlight.js 进行代码高亮
        const renderer = new marked.Renderer();
        renderer.code = function ({ text, lang }) {
            const code = lang && hljs.getLanguage(lang)
                ? hljs.highlight(text, { language: lang }).value
                : hljs.highlightAuto(text).value;
            const langLabel = lang ? `<span class="code-lang">${lang}</span>` : '';
            return `<pre>${langLabel}<code class="hljs">${code}</code></pre>`;
        };
        marked.use({ renderer });

        function renderMarkdown(text) {
            if (!text) return '';
            return marked.parse(text);
        }

        const chatArea = document.getElementById('chatArea');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const emotionBadge = document.getElementById('emotionBadge');
        const welcomeText = document.getElementById('welcomeText');

        let isStreaming = false;

        // ========== GPS 位置获取 ==========
        let userLocation = null; // { lat: number, lng: number }

        function requestLocation() {
            if (!navigator.geolocation) return;
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    userLocation = {
                        lat: pos.coords.latitude,
                        lng: pos.coords.longitude,
                    };
                    console.log('[位置] 已获取 GPS 坐标:', userLocation);
                },
                (err) => {
                    console.log('[位置] 获取失败或用户拒绝:', err.message);
                },
                { enableHighAccuracy: false, timeout: 10000, maximumAge: 600000 }
            );
        }
        // ========== 主题切换 ==========
        function applyTheme(mode) {
            const root = document.documentElement;
            if (mode === 'light') root.classList.add('light');
            else root.classList.remove('light');
            localStorage.setItem('theme', mode);
        }
        function getTheme() { return localStorage.getItem('theme') || 'dark'; }
        // 启动时应用
        applyTheme(getTheme());
        // 监听系统变化
        window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', e => {
            if (!localStorage.getItem('theme')) applyTheme(e.matches ? 'light' : 'dark');
        });

        // ========== 通知权限（首次点击页面时请求）==========
        function ensureNotifyPermission() {
            if (!('Notification' in window)) return;
            if (Notification.permission === 'default') {
                Notification.requestPermission();
            }
        }
        document.addEventListener('click', ensureNotifyPermission, { once: true });

        // 日程实时提醒：待完善（当前通过 .ics 导入系统日历实现提醒）

        // 页面加载时请求位置
        requestLocation();

        // ========== 搜索对话 ==========
        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');
        let searchTimer = null;

        searchInput.addEventListener('input', () => {
            clearTimeout(searchTimer);
            const q = searchInput.value.trim();
            if (!q) {
                searchResults.style.display = 'none';
                return;
            }
            searchTimer = setTimeout(() => doSearch(q), 250);
        });

        async function doSearch(q) {
            try {
                const resp = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
                const data = await resp.json();
                if (data.results.length === 0) {
                    searchResults.innerHTML = '<div class="search-empty">未找到匹配的对话</div>';
                } else {
                    searchResults.innerHTML = data.results.map(r => {
                        const roleTag = r.role === 'user'
                            ? '<span class="role-tag user">我</span>'
                            : '<span class="role-tag bot">小梦</span>';
                        const preview = r.preview.replace(
                            new RegExp(r.keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'),
                            m => `<mark>${m}</mark>`
                        );
                        return `<div class="search-item" data-index="${r.index}" onclick="jumpToMessage(${r.index})">${roleTag}${preview}</div>`;
                    }).join('');
                }
                searchResults.style.display = 'block';
            } catch (_) {}
        }

        function jumpToMessage(index) {
            searchResults.style.display = 'none';
            searchInput.value = '';
            // 在 chatArea 中查找对应消息
            const rows = chatArea.querySelectorAll('.msg-row');
            for (const row of rows) {
                // 欢迎文字占 DOM 第 0 位，历史索引 0 对应 DOM 索引 1
                if (parseInt(row.dataset.msgIndex) === index + 1) {
                    row.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    row.style.animation = 'none';
                    row.offsetHeight; // force reflow
                    row.style.animation = 'slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1)';
                    row.style.boxShadow = '0 0 24px rgba(251,191,36,0.5)';
                    setTimeout(() => { row.style.boxShadow = ''; }, 2000);
                    return;
                }
            }
            // 消息不在当前 DOM 中（历史太早被清屏了）
            alert('该消息已不在当前聊天视图中，请通过导出功能查看完整历史。');
        }

        // 点击外部关闭搜索结果
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.header-search')) {
                searchResults.style.display = 'none';
            }
        });

        // 情绪中文映射
        const emotionLabels = {
            happy: '开心 😊',
            sad: '低落 😢',
            angry: '生气 😤',
            anxious: '焦虑 😰',
            neutral: '平静 😌',
        };

        // ========== 语音输入 ==========
        const micBtn = document.getElementById('micBtn');
        let recognition = null;
        function initRecognition() {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) { micBtn.style.display = 'none'; return; }
            recognition = new SR();
            recognition.lang = 'zh-CN'; recognition.interimResults = true; recognition.continuous = false;
            let timeout;
            recognition.onresult = (e) => {
                clearTimeout(timeout);
                let text = ''; for (let i = 0; i < e.results.length; i++) text += e.results[i][0].transcript;
                msgInput.value = text; msgInput.style.height = 'auto';
                msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
                if (e.results[0].isFinal) setTimeout(() => stopVoice(), 500);
                timeout = setTimeout(() => stopVoice(), 15000);
            };
            recognition.onerror = (e) => { stopVoice(); if (e.error !== 'no-speech') alert('语音识别失败: ' + e.error); };
            recognition.onend = () => stopVoice();
        }
        function toggleVoice() {
            if (!recognition) initRecognition();
            if (!recognition) return;
            if (micBtn.classList.contains('recording')) { stopVoice(); return; }
            try { recognition.start(); micBtn.classList.add('recording'); micBtn.textContent = '⏹'; } catch (_) {}
        }
        function stopVoice() { micBtn.classList.remove('recording'); micBtn.textContent = '🎤'; try { recognition.stop(); } catch (_) {} }

        // ========== 自动调整 textarea 高度 ==========
        msgInput.addEventListener('input', () => {
            msgInput.style.height = 'auto';
            msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
        });

        // ========== 回车发送（Shift+Enter 换行）==========
        // ========== 快捷指令 ==========
        const slashMenu = document.getElementById('slashMenu');
        const SLASH_COMMANDS = [
            { kw: '/天气', icon: '🌤️', desc: '查天气', act: () => { msgInput.value='今天天气怎么样？'; msgInput.style.height='auto'; sendMessage(); } },
            { kw: '/搜索', icon: '🔍', desc: '搜对话', act: () => { document.getElementById('searchInput').focus(); } },
            { kw: '/导出', icon: '📥', desc: '导出 MD', act: () => exportChat('markdown') },
            { kw: '/清空', icon: '🧹', desc: '清输入', act: () => { msgInput.value=''; msgInput.style.height='auto'; msgInput.focus(); } },
            { kw: '/重置', icon: '🔄', desc: '新对话', act: () => resetChat() },
        ];
        let slashOn = false, slashIdx = 0;

        function showSlash(filt = '') {
            const list = SLASH_COMMANDS.filter(c => c.kw.includes(filt));
            if (!list.length) { slashMenu.style.display = 'none'; return; }
            slashMenu.innerHTML = list.map((c, i) =>
                `<div class="slash-item${i===0?' active':''}" data-i="${i}" onclick="runSlash(${SLASH_COMMANDS.indexOf(c)})">
                    <span class="slash-icon">${c.icon}</span><span class="slash-keyword">${c.kw}</span><span class="slash-desc">${c.desc}</span>
                </div>`
            ).join('');
            slashMenu.style.display = 'block'; slashIdx = 0; slashOn = true;
        }

        function runSlash(idx) {
            slashMenu.style.display = 'none'; slashOn = false;
            msgInput.value = ''; msgInput.style.height = 'auto'; msgInput.focus();
            SLASH_COMMANDS[idx].act();
        }

        // ========== 键盘快捷键 ==========
        msgInput.addEventListener('keydown', (e) => {
            if (slashOn) {
                if (e.key === 'ArrowDown') { e.preventDefault(); const its = slashMenu.querySelectorAll('.slash-item'); if (its.length) { its[slashIdx].classList.remove('active'); slashIdx = (slashIdx+1) % its.length; its[slashIdx].classList.add('active'); } return; }
                if (e.key === 'ArrowUp') { e.preventDefault(); const its = slashMenu.querySelectorAll('.slash-item'); if (its.length) { its[slashIdx].classList.remove('active'); slashIdx = (slashIdx-1+its.length) % its.length; its[slashIdx].classList.add('active'); } return; }
                if (e.key === 'Enter' || e.key === 'Tab') { e.preventDefault(); const its = slashMenu.querySelectorAll('.slash-item'); if (its[slashIdx]) its[slashIdx].click(); return; }
                if (e.key === 'Escape') { e.preventDefault(); slashMenu.style.display = 'none'; slashOn = false; return; }
            }
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            } else if (e.ctrlKey && e.key === 'l') {
                e.preventDefault();
                msgInput.value = '';
                msgInput.style.height = 'auto';
                msgInput.focus();
            }
        });

        msgInput.addEventListener('input', () => {
            const v = msgInput.value;
            if (v === '/') showSlash();
            else if (slashOn && v.startsWith('/')) showSlash(v);
            else if (slashOn && !v.startsWith('/')) { slashMenu.style.display = 'none'; slashOn = false; }
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.input-area')) { slashMenu.style.display = 'none'; slashOn = false; }
        });

        sendBtn.addEventListener('click', sendMessage);

        // ========== 发送消息 ==========
        async function sendMessage() {
            const text = msgInput.value.trim();
            if (!text || isStreaming) return;

            // 隐藏欢迎语
            if (welcomeText) welcomeText.style.display = 'none';

            // 添加用户消息
            appendMessage('user', text);

            // 清空输入
            msgInput.value = '';
            msgInput.style.height = 'auto';

            // 添加 bot 占位（打字指示器）
            const botRow = appendMessage('bot', '');
            const bubble = botRow.querySelector('.bubble');
            bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';

            isStreaming = true;
            sendBtn.disabled = true;

            try {
                const resp = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: text,
                        location: userLocation,
                        documents: uploadedDocs.length ? uploadedDocs : null,
                    }),
                });

                const reader = resp.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let fullText = '';
                let firstChunk = true;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const data = JSON.parse(line.slice(6));

                        if (data.type === 'emotion') {
                            updateEmotion(data.emotion);
                        } else if (data.type === 'chunk') {
                            if (firstChunk) {
                                bubble.innerHTML = '';
                                firstChunk = false;
                            }
                            fullText += data.content;
                            bubble.textContent = fullText;
                            scrollToBottom();
                        } else if (data.type === 'done') {
                            // 流结束，渲染 Markdown
                            bubble.innerHTML = renderMarkdown(fullText);
                        }
                    }
                }
            } catch (err) {
                bubble.textContent = '⚠️ 网络错误，请重试';
                bubble.style.color = '#f87171';
            }

            isStreaming = false;
            sendBtn.disabled = false;
            msgInput.focus();
            refreshUsage();
        }

        // ========== 刷新用量显示 ==========
        async function refreshUsage() {
            try {
                const resp = await fetch('/api/usage');
                const data = await resp.json();
                const badge = document.getElementById('usageBadge');
                if (!data.tokens_total || data.tokens_total === 0) {
                    badge.style.display = 'none';
                    return;
                }
                badge.style.display = '';
                const kTokens = (data.tokens_total / 1000).toFixed(1);
                const cost = data.cost.toFixed(3);
                badge.textContent = `🔥 ${kTokens}K · ¥${cost}`;
                badge.className = data.budget_remaining === 0 ? 'usage-badge over-budget' : 'usage-badge';
            } catch (_) {}
        }

        // ========== 添加消息 ==========
        function appendMessage(role, content) {
            const row = document.createElement('div');
            row.className = `msg-row ${role}`;

            const avatar = document.createElement('div');
            avatar.className = `msg-avatar ${role}`;
            if (role === 'bot' || role === 'assistant') {
                const img = document.createElement('img');
                img.src = '/static/avatar.jpg';
                img.alt = '小梦';
                avatar.appendChild(img);
            } else {
                avatar.textContent = '🙂';
            }

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerHTML = renderMarkdown(content);

            row.appendChild(avatar);
            row.appendChild(bubble);
            row.dataset.msgIndex = chatArea.children.length;
            chatArea.appendChild(row);
            scrollToBottom();

            return row;
        }

        // ========== 更新情绪标签 ==========
        function updateEmotion(emotion) {
            emotionBadge.textContent = emotionLabels[emotion] || '在线';
            emotionBadge.className = `emotion-badge emo-${emotion}`;
        }

        // ========== 滚动到底部 ==========
        function scrollToBottom() {
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // ========== 导出对话 ==========
        function exportChat(format) {
            const a = document.createElement('a');
            a.href = `/api/export?format=${format}`;
            a.download = '';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        // ========== 重置对话 ==========
        async function resetChat() {
            if (!confirm('确定要重置当前对话吗？（不会删除已保存的对话记录）')) return;
            await fetch('/api/reset', { method: 'POST' });
            uploadedDocs = []; updateDocBadge();
            chatArea.innerHTML = '';
            if (welcomeText) {
                chatArea.appendChild(welcomeText);
                welcomeText.style.display = '';
            }
            updateEmotion('neutral');
        }

        // ========== 清除所有数据 ==========
        async function clearAll() {
            if (!confirm('⚠️ 确定要清除所有数据吗？\n\n这将删除：\n• 所有对话历史\n• 所有长期记忆（ChromaDB）\n\n此操作不可撤销！')) return;
            await fetch('/api/clear', { method: 'POST' });
            uploadedDocs = []; updateDocBadge();
            chatArea.innerHTML = '';
            if (welcomeText) {
                chatArea.appendChild(welcomeText);
                welcomeText.style.display = '';
            }
            updateEmotion('neutral');
        }

        // ========== 加载历史对话 ==========
        async function loadHistory() {
            try {
                const resp = await fetch('/api/history');
                const data = await resp.json();
                if (data.history && data.history.length > 0) {
                    if (welcomeText) welcomeText.style.display = 'none';
                    for (const msg of data.history) {
                        appendMessage(msg.role, msg.content);
                    }
                }
                if (data.emotion && data.emotion !== 'neutral') {
                    updateEmotion(data.emotion);
                }
            } catch (err) {
            }
        }

        // ========== 加载情绪趋势 ==========
        async function loadEmotionChart() {
            try {
                const r = await fetch('/api/emotion/history?days=7'); const data = await r.json();
                if (!data.length) return;
                const panel = document.getElementById('emotionPanel');
                const chart = document.getElementById('emotionChart');
                panel.style.display = 'block';
                const maxCount = Math.max(1, ...data.map(d => Object.values(d).filter(v => typeof v === 'number').reduce((a,b) => a+b, 0)));
                const emotions = ['happy','sad','angry','anxious','neutral'];
                const colors = {happy:'#fbbf24',sad:'#60a5fa',angry:'#f87171',anxious:'#c084fc',neutral:'#4ade80'};
                chart.innerHTML = data.map(d => {
                    const total = emotions.reduce((s,e) => s + (d[e]||0), 0);
                    const h = Math.max(2, (total / maxCount) * 56);
                    const dlabel = d.date.slice(5); // MM-DD
                    return `<div class="emotion-bar-wrap"><div class="emotion-bar" style="height:${h}px; background:${colors[Object.entries(d).find(([k,v])=>emotions.includes(k)&&v>0)?.[0]||'neutral']};"></div><span class="emotion-day-label">${dlabel}</span></div>`;
                }).join('');
            } catch (_) {}
        }

        // ========== 加载人设列表 ==========
        async function loadPersonas() {
            try {
                const r = await fetch('/api/personas'); const personas = await r.json();
                const sel = document.getElementById('personaSelect');
                sel.innerHTML = personas.map(p => `<option value="${p.id}" ${p.id==='xiaomeng'?'selected':''}>${p.emoji} ${p.name}</option>`).join('');
            } catch (_) {}
        }
        async function switchPersona(id) {
            try {
                const r = await fetch('/api/persona/switch', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})});
                const d = await r.json();
                if (d.name) { document.getElementById('headerName').textContent = d.name; document.title = d.name + ' · AI Companion'; }
            } catch (_) {}
        }

        // ========== 文件上传（支持多文件）==========
        let uploadedDocs = []; // [{filename, text}]
        function updateDocBadge() {
            const row = document.getElementById('docRow');
            const badge = document.getElementById('docBadge');
            if (uploadedDocs.length === 0) {
                row.style.display = 'none';
                badge.innerHTML = '';
                msgInput.placeholder = '说点什么吧...（输入 / 查看快捷指令）';
            } else {
                row.style.display = 'flex';
                badge.innerHTML = uploadedDocs.map((d, i) =>
                    `<span class="doc-tag" onclick="removeDoc(${i})" title="点击移除">📄 ${d.filename} ✕</span>`
                ).join('');
                msgInput.placeholder = `已加载 ${uploadedDocs.length} 个文档，直接提问吧...`;
            }
        }
        function removeDoc(i) { uploadedDocs.splice(i, 1); updateDocBadge(); }
        async function uploadFile() {
            const input = document.getElementById('fileInput');
            const file = input.files[0]; if (!file) return;
            if (file.size > 10 * 1024 * 1024) { alert('文件太大，限制 10MB'); input.value = ''; return; }
            const form = new FormData(); form.append('file', file);
            document.getElementById('docBtn').textContent = '⏳';
            try {
                const r = await fetch('/api/upload', { method: 'POST', body: form });
                const d = await r.json();
                if (d.error) { alert(d.error); return; }
                // 同名替换，否则追加
                const idx = uploadedDocs.findIndex(x => x.filename === d.filename);
                if (idx >= 0) uploadedDocs[idx] = { filename: d.filename, text: d.text };
                else uploadedDocs.push({ filename: d.filename, text: d.text });
                updateDocBadge();
                msgInput.focus();
            } catch (e) { alert('上传失败: ' + e.message); }
            input.value = '';
            document.getElementById('docBtn').textContent = '📎';
        }

        // 页面加载后获取历史对话
        loadHistory();
        loadEmotionChart();
        loadPersonas();
        msgInput.focus();
    </script>
</body>
</html>
