<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小梦 · AI 虚拟伴侣</title>
    <style>
        /* ========== 全局重置 ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-1: #0f0c29;
            --bg-2: #302b63;
            --bg-3: #24243e;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text: #f0f0f5;
            --text-dim: #a0a0b8;
            --accent: #a78bfa;
            --accent-glow: rgba(167, 139, 250, 0.4);
            --user-bubble: linear-gradient(135deg, #667eea, #764ba2);
            --bot-bubble: rgba(255, 255, 255, 0.1);
            --emotion-happy: #fbbf24;
            --emotion-sad: #60a5fa;
            --emotion-angry: #f87171;
            --emotion-anxious: #c084fc;
            --emotion-neutral: #94a3b8;
        }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
            color: var(--text);
            overflow: hidden;
        }

        /* ========== 动态背景 ========== */
        body {
            background: linear-gradient(-45deg, var(--bg-1), var(--bg-2), var(--bg-3), #1a1a2e);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            position: relative;
        }

        @keyframes gradientShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 浮动光球 */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            z-index: 0;
            animation: float 20s ease-in-out infinite;
        }
        .orb-1 { width: 400px; height: 400px; background: #a78bfa; top: -100px; left: -100px; }
        .orb-2 { width: 350px; height: 350px; background: #ec4899; bottom: -80px; right: -80px; animation-delay: -5s; }
        .orb-3 { width: 300px; height: 300px; background: #3b82f6; top: 50%; left: 50%; animation-delay: -10s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33%      { transform: translate(30px, -50px) scale(1.1); }
            66%      { transform: translate(-20px, 30px) scale(0.95); }
        }

        /* ========== 主容器 ========== */
        #app {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            max-width: 860px;
            margin: 0 auto;
            padding: 16px;
        }

        /* ========== 顶部栏 ========== */
        .header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 24px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            margin-bottom: 12px;
        }

        .avatar-wrap {
            position: relative;
            width: 52px;
            height: 52px;
            flex-shrink: 0;
        }

        .avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.3);
            box-shadow: 0 0 20px var(--accent-glow);
            animation: avatarPulse 3s ease-in-out infinite;
            display: block;
        }

        @keyframes avatarPulse {
            0%, 100% { box-shadow: 0 0 20px var(--accent-glow); }
            50%      { box-shadow: 0 0 35px var(--accent-glow), 0 0 60px rgba(236, 72, 153, 0.2); }
        }

        /* 在线指示器 */
        .status-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 14px;
            height: 14px;
            background: #4ade80;
            border-radius: 50%;
            border: 2.5px solid var(--bg-2);
        }

        .header-info { flex: 1; }
        .header-name {
            font-size: 18px;
            font-weight: 600;
            line-height: 1.3;
        }
        .header-status {
            font-size: 12px;
            color: #4ade80;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* 情绪标签 */
        .emotion-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
            transition: all 0.3s;
        }
        .emotion-badge::before {
            content: "";
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }
        .emo-happy    { background: rgba(251,191,36,0.15); color: var(--emotion-happy); }
        .emo-happy::before    { background: var(--emotion-happy); box-shadow: 0 0 6px var(--emotion-happy); }
        .emo-sad      { background: rgba(96,165,250,0.15); color: var(--emotion-sad); }
        .emo-sad::before      { background: var(--emotion-sad); box-shadow: 0 0 6px var(--emotion-sad); }
        .emo-angry    { background: rgba(248,113,113,0.15); color: var(--emotion-angry); }
        .emo-angry::before    { background: var(--emotion-angry); box-shadow: 0 0 6px var(--emotion-angry); }
        .emo-anxious  { background: rgba(192,132,252,0.15); color: var(--emotion-anxious); }
        .emo-anxious::before  { background: var(--emotion-anxious); box-shadow: 0 0 6px var(--emotion-anxious); }
        .emo-neutral  { background: rgba(74, 222, 128, 0.15); color: #4ade80; }
        .emo-neutral::before  { background: #4ade80; box-shadow: 0 0 6px #4ade80; }

        /* ========== 聊天区域 ========== */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scroll-behavior: smooth;
        }

        .chat-area::-webkit-scrollbar { width: 5px; }
        .chat-area::-webkit-scrollbar-track { background: transparent; }
        .chat-area::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.15);
            border-radius: 10px;
        }

        /* 消息行 */
        .msg-row {
            display: flex;
            gap: 10px;
            max-width: 80%;
            animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .msg-row.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        /* 消息头像 */
        .msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        .msg-avatar.bot {
            background: linear-gradient(135deg, #a78bfa, #ec4899);
            box-shadow: 0 2px 12px rgba(167, 139, 250, 0.3);
            overflow: hidden;
        }
        .msg-avatar.bot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .msg-avatar.user {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid var(--glass-border);
        }

        /* 消息气泡 */
        .bubble {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14.5px;
            line-height: 1.6;
            word-break: break-word;
            position: relative;
        }

        .msg-row.bot .bubble {
            background: var(--bot-bubble);
            border: 1px solid var(--glass-border);
            border-top-left-radius: 6px;
            backdrop-filter: blur(10px);
        }

        .msg-row.user .bubble {
            background: var(--user-bubble);
            color: #fff;
            border-top-right-radius: 6px;
            box-shadow: 0 2px 16px rgba(102, 126, 234, 0.3);
        }

        /* 打字指示器 */
        .typing-dots {
            display: flex;
            gap: 5px;
            padding: 4px 0;
        }
        .typing-dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-dim);
            animation: typingBounce 1.4s ease-in-out infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30%           { transform: translateY(-6px); opacity: 1; }
        }

        /* ========== 欢迎语 ========== */
        .welcome-text {
            text-align: center;
            color: var(--text-dim);
            font-size: 13px;
            margin: auto;
            padding: 40px;
            line-height: 2;
        }
        .welcome-text .big {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #ec4899, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: block;
            margin-bottom: 8px;
        }

        /* ========== 输入区域 ========== */
        .input-area {
            padding: 12px 16px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            margin-top: 12px;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-area textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-size: 14.5px;
            font-family: inherit;
            resize: none;
            max-height: 120px;
            line-height: 1.5;
            padding: 8px 4px;
        }
        .input-area textarea::placeholder { color: var(--text-dim); }

        .send-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            background: linear-gradient(135deg, #a78bfa, #ec4899);
            color: #fff;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 2px 16px var(--accent-glow);
            flex-shrink: 0;
        }
        .send-btn:hover { transform: scale(1.08); box-shadow: 0 4px 24px var(--accent-glow); }
        .send-btn:active { transform: scale(0.95); }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        /* 操作按钮 */
        .action-bar {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            justify-content: center;
        }
        .action-btn {
            padding: 6px 16px;
            border-radius: 14px;
            border: 1px solid var(--glass-border);
            background: var(--glass);
            color: var(--text-dim);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
            font-family: inherit;
        }
        .action-btn:hover {
            color: var(--text);
            border-color: var(--accent);
            background: rgba(167, 139, 250, 0.1);
        }
        .action-btn.danger:hover {
            color: #f87171;
            border-color: #f87171;
            background: rgba(248, 113, 113, 0.1);
        }

        /* ========== 响应式 ========== */
        @media (max-width: 600px) {
            #app { padding: 8px; }
            .header { padding: 12px 16px; border-radius: 16px; }
            .msg-row { max-width: 90%; }
            .bubble { font-size: 14px; }
        }
    </style>
</head>
<body>
    <!-- 背景光球 -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div id="app">
        <!-- 顶部栏 -->
        <div class="header">
                <div class="avatar-wrap">
                    <img class="avatar" src="/static/avatar.jpg" alt="小梦">
                    <div class="status-dot"></div>
                </div>
            <div class="header-info">
                <div class="header-name">小梦</div>
                <div class="header-status">
                    <span id="emotionBadge" class="emotion-badge emo-neutral">在线</span>
                </div>
            </div>
        </div>

        <!-- 聊天区域 -->
        <div class="chat-area" id="chatArea">
            <div class="welcome-text" id="welcomeText">
                <span class="big">你好呀 ~</span>
                我是<span style="color:var(--accent)">小梦</span>，你的 AI 虚拟伴侣<br>
                有什么想聊的，随时告诉我 ✨
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="input-area">
            <textarea id="msgInput" placeholder="说点什么吧..." rows="1"></textarea>
            <button class="send-btn" id="sendBtn">➤</button>
        </div>

        <!-- 操作按钮 -->
        <div class="action-bar">
            <button class="action-btn" onclick="resetChat()">🔄 重置对话</button>
            <button class="action-btn danger" onclick="clearAll()">🗑️ 清除所有数据</button>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const emotionBadge = document.getElementById('emotionBadge');
        const welcomeText = document.getElementById('welcomeText');

        let isStreaming = false;

        // 情绪中文映射
        const emotionLabels = {
            happy: '开心 😊',
            sad: '低落 😢',
            angry: '生气 😤',
            anxious: '焦虑 😰',
            neutral: '平静 😌',
        };

        // ========== 自动调整 textarea 高度 ==========
        msgInput.addEventListener('input', () => {
            msgInput.style.height = 'auto';
            msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
        });

        // ========== 回车发送（Shift+Enter 换行）==========
        msgInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        // ========== 发送消息 ==========
        async function sendMessage() {
            const text = msgInput.value.trim();
            if (!text || isStreaming) return;

            // 隐藏欢迎语
            if (welcomeText) welcomeText.style.display = 'none';

            // 添加用户消息
            appendMessage('user', text);

            // 清空输入
            msgInput.value = '';
            msgInput.style.height = 'auto';

            // 添加 bot 占位（打字指示器）
            const botRow = appendMessage('bot', '');
            const bubble = botRow.querySelector('.bubble');
            bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';

            isStreaming = true;
            sendBtn.disabled = true;

            try {
                const resp = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text }),
                });

                const reader = resp.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let fullText = '';
                let firstChunk = true;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const data = JSON.parse(line.slice(6));

                        if (data.type === 'emotion') {
                            updateEmotion(data.emotion);
                        } else if (data.type === 'chunk') {
                            if (firstChunk) {
                                bubble.innerHTML = '';
                                firstChunk = false;
                            }
                            fullText += data.content;
                            bubble.textContent = fullText;
                            scrollToBottom();
                        } else if (data.type === 'done') {
                            // 完成
                        }
                    }
                }
            } catch (err) {
                bubble.textContent = '⚠️ 网络错误，请重试';
                bubble.style.color = '#f87171';
            }

            isStreaming = false;
            sendBtn.disabled = false;
            msgInput.focus();
        }

        // ========== 添加消息 ==========
        function appendMessage(role, content) {
            const row = document.createElement('div');
            row.className = `msg-row ${role}`;

            const avatar = document.createElement('div');
            avatar.className = `msg-avatar ${role}`;
            if (role === 'bot') {
                const img = document.createElement('img');
                img.src = '/static/avatar.jpg';
                img.alt = '小梦';
                avatar.appendChild(img);
            } else {
                avatar.textContent = '🙂';
            }

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = content;

            row.appendChild(avatar);
            row.appendChild(bubble);
            chatArea.appendChild(row);
            scrollToBottom();

            return row;
        }

        // ========== 更新情绪标签 ==========
        function updateEmotion(emotion) {
            emotionBadge.textContent = emotionLabels[emotion] || '在线';
            emotionBadge.className = `emotion-badge emo-${emotion}`;
        }

        // ========== 滚动到底部 ==========
        function scrollToBottom() {
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // ========== 重置对话 ==========
        async function resetChat() {
            if (!confirm('确定要重置当前对话吗？（不会删除已保存的对话记录）')) return;
            await fetch('/api/reset', { method: 'POST' });
            chatArea.innerHTML = '';
            if (welcomeText) {
                chatArea.appendChild(welcomeText);
                welcomeText.style.display = '';
            }
            updateEmotion('neutral');
        }

        // ========== 清除所有数据 ==========
        async function clearAll() {
            if (!confirm('⚠️ 确定要清除所有数据吗？\n\n这将删除：\n• 所有对话历史\n• 所有长期记忆（ChromaDB）\n\n此操作不可撤销！')) return;
            await fetch('/api/clear', { method: 'POST' });
            chatArea.innerHTML = '';
            if (welcomeText) {
                chatArea.appendChild(welcomeText);
                welcomeText.style.display = '';
            }
            updateEmotion('neutral');
        }

        // ========== 加载历史对话 ==========
        async function loadHistory() {
            try {
                const resp = await fetch('/api/history');
                const data = await resp.json();
                if (data.history && data.history.length > 0) {
                    if (welcomeText) welcomeText.style.display = 'none';
                    for (const msg of data.history) {
                        appendMessage(msg.role, msg.content);
                    }
                }
                if (data.emotion && data.emotion !== 'neutral') {
                    updateEmotion(data.emotion);
                }
            } catch (err) {
                // 忽略
            }
        }

        // 页面加载后获取历史对话
        loadHistory();
        msgInput.focus();
    </script>
</body>
</html>
