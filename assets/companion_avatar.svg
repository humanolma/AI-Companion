<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f9a8d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- 背景圆 -->
  <circle cx="100" cy="100" r="95" fill="url(#bg)" />
  <!-- 脸部 -->
  <circle cx="100" cy="110" r="45" fill="#ffe8d6" />
  <!-- 眼睛 -->
  <ellipse cx="85" cy="105" rx="5" ry="6" fill="#333" />
  <ellipse cx="115" cy="105" rx="5" ry="6" fill="#333" />
  <!-- 腮红 -->
  <ellipse cx="80" cy="120" rx="10" ry="5" fill="#f9a8d4" opacity="0.6" />
  <ellipse cx="120" cy="120" rx="10" ry="5" fill="#f9a8d4" opacity="0.6" />
  <!-- 嘴巴 -->
  <path d="M 88 125 Q 100 135 112 125" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round" />
  <!-- 头发 -->
  <path d="M 55 85 Q 60 45 100 40 Q 140 45 145 85" fill="#6b4423" />
  <!-- 装饰：星星 -->
  <text x="160" y="50" font-size="20" opacity="0.6">✨</text>
  <text x="30" y="60" font-size="16" opacity="0.5">💫</text>
</svg>
